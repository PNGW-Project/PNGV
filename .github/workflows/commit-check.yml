- name: Validate commits
  run: |
    git fetch origin main
    COMMITS=$(git log origin/main..HEAD --pretty=format:"%s")

    echo "$COMMITS" | while IFS= read -r commit
    do
      echo "Checking: $commit"

      if [[ ! "$commit" =~ PNGW-[0-9]+ ]]; then
        echo "Commit message must contain PNGW-123"
        exit 1
      fi
    done
